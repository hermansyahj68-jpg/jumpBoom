<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>JumpBoom</title>

<link rel="icon" href="icon.png">

    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

canvas{
display:block;
}

#score{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:35px;
color:white;
font-weight:bold;
}

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:white;
font-weight:bold;
}

#restart{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ffcc00;
display:none;
}

#bird{
position:absolute;
left:60px;
width:50px;
pointer-events:none;
}

#boom{
position:absolute;
width:120px;
display:none;
pointer-events:none;
}

</style>
</head>

<body>

<div id="score">0</div>
<div id="countdown">3</div>

<button id="restart">Restart</button>

<img id="bird" src="player.png">
<img id="boom" src="ledakan.gif">
<audio id="boomSound" src="audioLedakan.mp3"></audio>
    <audio id="jumpSound" src="tiktik.mp3"></audio>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const bird=document.getElementById("bird");
const boom=document.getElementById("boom");
    const boomSound = document.getElementById("boomSound");
    const jumpSound = document.getElementById("jumpSound");

const bgImg=new Image();

bgImg.onload = function(){
    resetGame();   // game baru mulai setelah gambar siap
}

bgImg.src = "latarBelakang.jpg";

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let birdY;
let velocity;

let gravity=0.6;
let jump=-10;

let birdSize=50;

let pipes=[];
let pipeWidth=70;
let gap=200;

let score=0;

let gameOver=false;
let gameStarted=false;

function resetGame(){

birdY=canvas.height/2;
velocity=0;

pipes=[];
score=0;

gameOver=false;
gameStarted=false;

bird.style.display="block";
boom.style.display="none";

document.getElementById("score").innerText=0;
document.getElementById("restart").style.display="none";

startCountdown();

}

function startCountdown(){

let count=3;
const cd=document.getElementById("countdown");

cd.style.display="block";
cd.innerText=count;

let timer=setInterval(()=>{

count--;

if(count>0){

cd.innerText=count;

}else if(count===0){

cd.innerText="GO";

}else{

clearInterval(timer);
cd.style.display="none";
gameStarted=true;

}

},1000);

}

function spawnPipe(){

let topHeight=Math.random()*(canvas.height-400)+50;

pipes.push({
x:canvas.width,
top:topHeight,
bottom:topHeight+gap,
passed:false
});

}

setInterval(()=>{

if(gameStarted && !gameOver){
spawnPipe();
}

},2000);

function update(){

if(!gameStarted || gameOver) return;

velocity+=gravity;
birdY+=velocity;

if(birdY>canvas.height){
endGame();
}

for(let p of pipes){

p.x-=4;

if(!p.passed && p.x<80){

score++;
document.getElementById("score").innerText=score;
p.passed=true;

}

if(
80+birdSize/2>p.x &&
80-birdSize/2<p.x+pipeWidth &&
(birdY-birdSize/2<p.top || birdY+birdSize/2>p.bottom)
){
endGame();
}

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);

for(let p of pipes){

ctx.fillStyle="green";

ctx.fillRect(p.x,0,pipeWidth,p.top);
ctx.fillRect(p.x,p.bottom,pipeWidth,canvas.height-p.bottom);

}

bird.style.top=(birdY-birdSize/2)+"px";
bird.style.width=birdSize+"px";

if(gameOver){

ctx.fillStyle="black";
ctx.font="50px sans-serif";
ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);

}

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

function flap(){

if(gameOver) return;
velocity=jump;
    jumpSound.currentTime = 0;
jumpSound.play();

}

function endGame(){

gameOver=true;

bird.style.display="none";

boom.style.left="60px";
boom.style.top=(birdY-birdSize/2)+"px";
boom.style.display="block";

    boomSound.currentTime = 0;
boomSound.play();

setTimeout(()=>{

boom.style.display="none";
document.getElementById("restart").style.display="block";

},1500); // 1.5 detik

}

document.addEventListener("click",flap);
document.addEventListener("touchstart",flap);

document.addEventListener("keydown",e=>{
if(e.code==="Space") flap();
});

document.getElementById("restart").onclick=resetGame;

resetGame();

</script>

</body>
</html>
